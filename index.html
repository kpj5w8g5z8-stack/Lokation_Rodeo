<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Location Roulette</title>

<!-- iOS: als App zum Homescreen, Status-Bar passend zum dunklen Look -->
<meta name="theme-color" content="#15120D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Location Roulette" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="color-scheme" content="dark" />
<!-- apple-touch-icon + manifest werden per JS (Canvas/Blob) eingehängt, damit alles in EINER Datei bleibt -->

<style>
  :root{
    /* Palette: warmer Espresso-Dark statt blaustichigem Schwarz, ein einziger Akzent (Safran) */
    --bg:        #15120D;
    --bg-2:      #1C1813;
    --surface:   #241F17;
    --surface-2: #2D271D;
    --line:      rgba(255,255,255,.07);
    --line-2:    rgba(255,255,255,.12);
    --text:      #F3EBDD;
    --muted:     #A99C86;
    --amber:     #F3A227;
    --amber-2:   #FFC25C;
    --amber-tint: rgba(243,162,39,.14);
    --danger:    #E5664A;

    --font-display: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    --font-body: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;

    --r-lg: 22px;
    --r-md: 16px;
    --r-sm: 12px;
    --dock-h: calc(76px + env(safe-area-inset-bottom));
    --tap: 52px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #211A10 0%, var(--bg) 55%) fixed,
      var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  button{ font-family: inherit; color: inherit; cursor: pointer; }
  input[type="text"], input[type="url"], textarea{ font-family: inherit; }

  /* ---------- Topbar ---------- */
  .topbar{
    position: sticky; top:0; z-index: 5;
    padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
    background: linear-gradient(180deg, var(--bg) 60%, transparent);
    display:flex; align-items:center; gap:12px;
  }
  .brand__mark{
    width:44px; height:44px; flex:0 0 auto;
    display:grid; place-items:center;
    font-size: 24px;
    border-radius: 14px;
    background: var(--amber-tint);
    box-shadow: inset 0 0 0 1px var(--line-2);
  }
  .brand__name{
    margin:0; font-family: var(--font-display);
    font-size: 22px; font-weight: 800; letter-spacing: -.02em;
  }
  .brand__name b{ color: var(--amber); font-weight: 800; }
  .brand__sub{ margin:2px 0 0; font-size: 13px; color: var(--muted); }

  /* ---------- Stage ---------- */
  .stage{
    padding: 4px 16px var(--dock-h);
    max-width: 640px; margin: 0 auto;
  }

  .filter{
    display:inline-flex; align-items:center; gap:10px;
    margin: 6px 4px 18px;
    padding: 11px 16px 11px 13px;
    border-radius: 999px;
    background: var(--surface);
    box-shadow: inset 0 0 0 1px var(--line);
    font-size: 14.5px; color: var(--muted);
    user-select: none;
    transition: color .15s, box-shadow .15s, background .15s;
  }
  .filter input{ position:absolute; opacity:0; pointer-events:none; }
  .filter .knob{
    width: 42px; height: 25px; border-radius: 999px;
    background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--line-2);
    position: relative; transition: background .2s;
  }
  .filter .knob::after{
    content:""; position:absolute; top:3px; left:3px;
    width:19px; height:19px; border-radius:50%;
    background:#7A6F5C; transition: transform .2s, background .2s;
  }
  .filter input:checked ~ .knob{ background: var(--amber); }
  .filter input:checked ~ .knob::after{ transform: translateX(17px); background:#1A140A; }
  .filter:has(input:checked){ color: var(--text); box-shadow: inset 0 0 0 1px var(--amber-tint); }
  .filter input:focus-visible ~ .knob{ outline: 2px solid var(--amber-2); outline-offset: 3px; }

  /* ---------- Library ---------- */
  .library{ display:flex; flex-direction: column; gap: 12px; }

  .card{
    background: var(--surface);
    border-radius: var(--r-lg);
    box-shadow: inset 0 0 0 1px var(--line);
    padding: 16px 16px 14px;
    animation: rise .28s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{ from{ opacity:0; transform: translateY(8px);} to{opacity:1;transform:none;} }

  .card__top{ display:flex; align-items:flex-start; gap:10px; }
  .card__title{
    margin:0; flex:1 1 auto; min-width:0;
    font-family: var(--font-display);
    font-size: 18px; font-weight: 750; letter-spacing:-.01em;
    overflow-wrap:anywhere;
  }
  .badge{
    flex:0 0 auto; margin-top:1px;
    display:inline-flex; align-items:center; gap:5px;
    font-size:12px; font-weight:600; color: var(--amber-2);
    background: var(--amber-tint);
    padding: 4px 9px; border-radius: 999px;
  }
  .card__menu{
    margin: 9px 0 2px; font-size: 14px; color: var(--muted);
    overflow-wrap:anywhere;
    padding-left: 11px; border-left: 2px solid var(--amber-tint);
  }
  .card__actions{ display:flex; gap:8px; margin-top:14px; }

  .chip{
    flex:1 1 auto; min-height: 44px;
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    border:0; border-radius: var(--r-sm);
    background: var(--surface-2);
    box-shadow: inset 0 0 0 1px var(--line);
    color: var(--text); font-size: 14px; font-weight:600;
    text-decoration:none;
    transition: transform .08s, background .15s;
  }
  .chip:active{ transform: scale(.97); }
  .chip--live{ color: var(--amber-2); }
  .chip--del{ flex:0 0 auto; width:46px; color: var(--danger); font-size:18px; }

  /* Leerer Zustand */
  .empty{
    text-align:center; color: var(--muted);
    padding: 48px 24px; border-radius: var(--r-lg);
    box-shadow: inset 0 0 0 1px var(--line);
    background: var(--surface);
  }
  .empty .em{ font-size: 34px; display:block; margin-bottom: 10px; }
  .empty p{ margin: 4px 0; }
  .empty strong{ color: var(--text); font-weight: 700; }
  [hidden]{ display:none !important; }

  /* ---------- Dock (Daumen-Bereich unten) ---------- */
  .dock{
    position: fixed; left:0; right:0; bottom:0; z-index: 6;
    display:flex; gap:12px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(0deg, var(--bg) 55%, transparent);
  }
  .btn-add{
    flex:0 0 auto; width: 58px; min-height: var(--tap);
    border-radius: var(--r-md); border:0;
    background: var(--surface);
    box-shadow: inset 0 0 0 1px var(--line-2);
    color: var(--text); font-size: 26px; line-height:1;
    transition: transform .08s;
  }
  .btn-add:active{ transform: scale(.95); }
  .btn-spin{
    flex:1 1 auto; min-height: var(--tap);
    border:0; border-radius: var(--r-md);
    background: linear-gradient(180deg, var(--amber-2), var(--amber));
    color: #1A140A; font-family: var(--font-display);
    font-size: 18px; font-weight: 800; letter-spacing:-.01em;
    box-shadow: 0 8px 22px -8px rgba(243,162,39,.55);
    transition: transform .08s, filter .15s;
  }
  .btn-spin:active{ transform: scale(.98); filter: brightness(1.05); }
  .btn-spin:disabled{ opacity:.4; box-shadow:none; }

  /* ---------- Scrim + Bottom-Sheet ---------- */
  .scrim{
    position: fixed; inset:0; z-index: 9;
    background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
    animation: fade .2s ease both;
  }
  @keyframes fade{ from{opacity:0} to{opacity:1} }

  .sheet{
    position: fixed; left:0; right:0; bottom:0; z-index: 10;
    background: var(--bg-2);
    border-radius: 26px 26px 0 0;
    box-shadow: 0 -1px 0 var(--line-2), 0 -30px 60px -20px rgba(0,0,0,.6);
    padding: 10px 20px calc(20px + env(safe-area-inset-bottom));
    max-width: 640px; margin: 0 auto;
    animation: sheetUp .32s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes sheetUp{ from{ transform: translateY(100%);} to{ transform:none;} }
  .grip{ width:40px; height:4px; border-radius:99px; background: var(--line-2); margin: 4px auto 14px; }
  .sheet h2{ margin: 0 0 16px; font-family: var(--font-display); font-size: 20px; font-weight:800; letter-spacing:-.01em; }

  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-size: 13px; color: var(--muted); margin: 0 0 7px 2px; }
  .input{
    width:100%; min-height: var(--tap);
    background: var(--surface); border:0; border-radius: var(--r-md);
    box-shadow: inset 0 0 0 1px var(--line-2);
    color: var(--text); font-size: 16px;
    padding: 13px 15px;
  }
  textarea.input{ min-height: 80px; resize: vertical; line-height:1.45; }
  .input::placeholder{ color: #6F6450; }
  .input:focus{ outline:none; box-shadow: inset 0 0 0 1.5px var(--amber); }

  .checkrow{
    display:flex; align-items:center; gap:12px;
    background: var(--surface); border-radius: var(--r-md);
    box-shadow: inset 0 0 0 1px var(--line);
    padding: 12px 15px; margin-bottom: 14px; user-select:none;
  }
  .checkrow input{ position:absolute; opacity:0; pointer-events:none; }
  .checkrow .box{
    width:26px; height:26px; flex:0 0 auto; border-radius:8px;
    background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--line-2);
    display:grid; place-items:center; color:#1A140A; font-size:17px; font-weight:900;
    transition: background .15s;
  }
  .checkrow .box::after{ content:"✓"; opacity:0; transition:opacity .12s; }
  .checkrow input:checked ~ .box{ background: var(--amber); }
  .checkrow input:checked ~ .box::after{ opacity:1; }
  .checkrow span{ font-size:15px; font-weight:600; }
  .checkrow input:focus-visible ~ .box{ outline:2px solid var(--amber-2); outline-offset:3px; }

  .sheet__actions{ display:flex; gap:10px; margin-top: 6px; }
  .btn-cancel{
    flex:0 0 auto; padding: 0 20px; min-height: var(--tap);
    border:0; border-radius: var(--r-md); background: var(--surface-2);
    box-shadow: inset 0 0 0 1px var(--line); color: var(--muted);
    font-size: 15px; font-weight:600;
  }
  .btn-save{
    flex:1 1 auto; min-height: var(--tap);
    border:0; border-radius: var(--r-md);
    background: linear-gradient(180deg, var(--amber-2), var(--amber));
    color:#1A140A; font-size: 16px; font-weight: 800;
    box-shadow: 0 8px 22px -10px rgba(243,162,39,.5);
  }
  .err{ color: var(--danger); font-size: 13px; margin: -8px 2px 12px; min-height: 1px; }

  /* ---------- Roulette-Ergebnis (das Signature-Moment) ---------- */
  .result{
    position: fixed; inset:0; z-index: 12;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 32px 24px calc(32px + env(safe-area-inset-bottom));
    background: radial-gradient(90% 60% at 50% 38%, #241B0E 0%, rgba(10,8,5,.96) 70%);
    backdrop-filter: blur(3px);
    animation: fade .25s ease both;
    text-align:center;
  }
  .result__eyebrow{
    font-size: 12.5px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--amber); font-weight: 700; margin-bottom: 22px;
  }
  .reel{
    font-family: var(--font-display);
    font-size: clamp(30px, 9vw, 44px); font-weight: 850; letter-spacing:-.02em;
    line-height: 1.1; min-height: 1.1em; overflow-wrap:anywhere;
    max-width: 14ch;
  }
  .reel.spinning{ color: var(--muted); filter: blur(.3px); }
  .reel.landed{
    color: var(--text);
    animation: land .55s cubic-bezier(.18,1.5,.3,1) both;
  }
  @keyframes land{ 0%{transform: scale(.6); opacity:0;} 60%{transform: scale(1.08);} 100%{transform: scale(1); opacity:1;} }

  .halo{
    position:absolute; width:300px; height:300px; border-radius:50%;
    background: radial-gradient(circle, rgba(243,162,39,.28), transparent 62%);
    opacity:0; pointer-events:none;
  }
  .halo.on{ animation: halo 1.1s ease-out forwards; }
  @keyframes halo{ 0%{opacity:0; transform:scale(.5);} 40%{opacity:1;} 100%{opacity:0; transform:scale(1.5);} }

  .result__menu{
    margin: 20px 0 4px; font-size: 15.5px; color: var(--amber-2);
    max-width: 30ch; overflow-wrap:anywhere;
  }
  .result__hint{ color:var(--muted); font-size:15px; max-width: 26ch; margin-top: 6px; }
  .result__actions{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    margin-top: 30px; width:100%; max-width: 360px;
  }
  .rbtn{
    flex:1 1 140px; min-height: var(--tap);
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:0; border-radius: var(--r-md); text-decoration:none;
    font-size: 15px; font-weight: 700;
    background: var(--surface); box-shadow: inset 0 0 0 1px var(--line-2);
    color: var(--text);
  }
  .rbtn--go{ background: linear-gradient(180deg, var(--amber-2), var(--amber)); color:#1A140A; box-shadow:none; }
  .rbtn--again{ flex-basis:100%; background: transparent; box-shadow: inset 0 0 0 1px var(--line-2); color: var(--muted); }
  .rbtn:active{ transform: scale(.98); }
  .result__close{
    position:absolute; top: calc(env(safe-area-inset-top) + 14px); right: 18px;
    width:42px; height:42px; border-radius:50%; border:0;
    background: var(--surface); box-shadow: inset 0 0 0 1px var(--line-2);
    color: var(--muted); font-size:20px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand__mark" aria-hidden="true">🎲</div>
    <div>
      <h1 class="brand__name">Location <b>Roulette</b></h1>
      <p class="brand__sub" id="count">Lädt …</p>
    </div>
  </header>

  <main class="stage">
    <label class="filter">
      <input type="checkbox" id="filterLunch" />
      <span class="knob" aria-hidden="true"></span>
      <span>Nur mit Mittagsmenü</span>
    </label>

    <section class="library" id="library" aria-live="polite"></section>

    <div class="empty" id="empty" hidden>
      <span class="em" aria-hidden="true">🍽️</span>
      <p><strong>Noch keine Orte gespeichert</strong></p>
      <p>Tippe unten auf <strong>＋</strong> und füge deinen ersten Ort hinzu.</p>
    </div>
  </main>

  <nav class="dock">
    <button class="btn-add" id="openAdd" aria-label="Ort hinzufügen">＋</button>
    <button class="btn-spin" id="spin">🎲 Roulette</button>
  </nav>

  <!-- ===== Eingabe-Sheet ===== -->
  <div class="scrim" id="scrim" hidden></div>
  <div class="sheet" id="addSheet" role="dialog" aria-modal="true" aria-label="Ort hinzufügen" hidden>
    <div class="grip" aria-hidden="true"></div>
    <h2>Ort hinzufügen</h2>

    <div class="field">
      <label for="fName">Name des Ortes</label>
      <input class="input" id="fName" type="text" placeholder="z. B. Trattoria Da Mario / Cool Bar" autocomplete="off" enterkeyhint="next" />
    </div>

    <div class="field">
      <label for="fUrl">Link (Instagram, Google Maps …)</label>
      <input class="input" id="fUrl" type="url" placeholder="https://…" inputmode="url" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="done" />
    </div>

    <label class="checkrow">
      <input type="checkbox" id="fHasLunch" />
      <span class="box" aria-hidden="true"></span>
      <span>Hat Mittagsmenü? 🍽️</span>
    </label>

    <div class="field" id="lunchWrap" hidden>
      <label for="fLunch">Infos zum Mittagsmenü / Preise</label>
      <textarea class="input" id="fLunch" placeholder="z. B. Mo–Fr 11:30–14:00 · Tagesteller 14 €"></textarea>
    </div>

    <div class="err" id="formErr" aria-live="assertive"></div>

    <div class="sheet__actions">
      <button class="btn-cancel" id="cancelAdd">Abbrechen</button>
      <button class="btn-save" id="savePlace">Speichern</button>
    </div>
  </div>

  <!-- ===== Roulette-Ergebnis ===== -->
  <div class="result" id="result" role="dialog" aria-modal="true" aria-label="Ergebnis" hidden>
    <button class="result__close" id="closeResult" aria-label="Schließen">✕</button>
    <div class="halo" id="halo" aria-hidden="true"></div>
    <p class="result__eyebrow" id="resultEyebrow">Heute geht's zu …</p>
    <div class="reel" id="reel"></div>
    <p class="result__menu" id="resultMenu" hidden></p>
    <p class="result__hint" id="resultHint" hidden></p>
    <div class="result__actions" id="resultActions" hidden></div>
  </div>

<script>
"use strict";
(() => {
  /* =========================================================================
     Location Roulette – 100 % lokal. Keine Server-Calls, keine Cookies, keine Keys.
     Alle Daten liegen ausschließlich im localStorage dieses Geräts.
     ========================================================================= */

  const STORE_KEY = "lunch_roulette_v1";
  const $ = (id) => document.getElementById(id);
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---------- Datenhaltung (localStorage) ---------- */
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }
  function persist(list) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(list)); }
    catch (e) { alert("Speichern fehlgeschlagen – ist der Gerätespeicher voll?"); }
  }
  let places = load();

  /* ---------- Sicherheit: Links streng prüfen ----------
     Nur http/https zulassen. javascript:, data: usw. werden blockiert,
     damit aus gespeicherten Links niemals Code ausgeführt werden kann. */
  function safeUrl(raw) {
    let u = (raw || "").trim();
    if (!u) return null;
    if (!/^https?:\/\//i.test(u)) {
      if (/^[\w.-]+\.[a-z]{2,}(\/|$|\?)/i.test(u)) u = "https://" + u; // bloße Domain ergänzen
      else return null;
    }
    try {
      const p = new URL(u);
      return (p.protocol === "http:" || p.protocol === "https:") ? p.href : null;
    } catch (e) { return null; }
  }

  // Google-Maps-Suche nach dem Ortsnamen – zeigt live Öffnungszeiten / Auslastung.
  function liveStatusUrl(name) {
    return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(name);
  }
  function openExternal(url) {
    if (!url) return;
    window.open(url, "_blank", "noopener,noreferrer");
  }

  /* ---------- Liste rendern (XSS-sicher per textContent) ---------- */
  const libraryEl = $("library");
  const emptyEl = $("empty");
  const countEl = $("count");

  function render() {
    libraryEl.textContent = "";
    const n = places.length;
    countEl.textContent = n === 0 ? "Noch keine Orte" : (n === 1 ? "1 Ort gespeichert" : n + " Orte gespeichert");
    emptyEl.hidden = n !== 0;
    $("spin").disabled = n === 0;

    // Neueste zuerst
    [...places].reverse().forEach((p) => {
      const card = document.createElement("article");
      card.className = "card";

      const top = document.createElement("div");
      top.className = "card__top";

      const title = document.createElement("h3");
      title.className = "card__title";
      title.textContent = p.name;
      top.appendChild(title);

      if (p.hasLunch) {
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "🍽️ Menü";
        top.appendChild(badge);
      }
      card.appendChild(top);

      if (p.hasLunch && p.lunchInfo) {
        const menu = document.createElement("p");
        menu.className = "card__menu";
        menu.textContent = p.lunchInfo;
        card.appendChild(menu);
      }

      const actions = document.createElement("div");
      actions.className = "card__actions";

      const safe = safeUrl(p.url);
      if (safe) {
        const open = document.createElement("a");
        open.className = "chip";
        open.href = safe;
        open.target = "_blank";
        open.rel = "noopener noreferrer";
        open.textContent = "↗ Öffnen";
        actions.appendChild(open);
      }

      const live = document.createElement("button");
      live.className = "chip chip--live";
      live.type = "button";
      live.textContent = "📍 Live-Status";
      live.addEventListener("click", () => openExternal(liveStatusUrl(p.name)));
      actions.appendChild(live);

      const del = document.createElement("button");
      del.className = "chip chip--del";
      del.type = "button";
      del.setAttribute("aria-label", "Ort löschen");
      del.textContent = "🗑";
      del.addEventListener("click", () => deletePlace(p.id));
      actions.appendChild(del);

      card.appendChild(actions);
      libraryEl.appendChild(card);
    });
  }

  function deletePlace(id) {
    const p = places.find((x) => x.id === id);
    if (p && !confirm('„' + p.name + '" löschen?')) return;
    places = places.filter((x) => x.id !== id);
    persist(places);
    render();
  }

  /* ---------- Eingabe-Sheet ---------- */
  const sheet = $("addSheet"), scrim = $("scrim");
  const fName = $("fName"), fUrl = $("fUrl"), fHasLunch = $("fHasLunch"),
        fLunch = $("fLunch"), lunchWrap = $("lunchWrap"), formErr = $("formErr");

  function openSheet() {
    formErr.textContent = "";
    scrim.hidden = false; sheet.hidden = false;
    setTimeout(() => fName.focus(), 60);
  }
  function closeSheet() {
    sheet.hidden = true; scrim.hidden = true;
  }
  function resetForm() {
    fName.value = ""; fUrl.value = ""; fLunch.value = "";
    fHasLunch.checked = false; lunchWrap.hidden = true; formErr.textContent = "";
  }

  fHasLunch.addEventListener("change", () => {
    lunchWrap.hidden = !fHasLunch.checked;
    if (fHasLunch.checked) setTimeout(() => fLunch.focus(), 50);
  });

  function savePlace() {
    const name = fName.value.trim();
    const urlRaw = fUrl.value.trim();
    formErr.textContent = "";

    if (!name) { formErr.textContent = "Bitte einen Namen eingeben."; fName.focus(); return; }
    if (urlRaw && !safeUrl(urlRaw)) {
      formErr.textContent = "Der Link sieht ungültig aus (nur http/https erlaubt).";
      fUrl.focus(); return;
    }

    places.push({
      id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
      name,
      url: urlRaw,
      hasLunch: fHasLunch.checked,
      lunchInfo: fHasLunch.checked ? fLunch.value.trim() : "",
      created: Date.now()
    });
    persist(places);
    render();
    resetForm();
    closeSheet();
  }

  $("openAdd").addEventListener("click", openSheet);
  $("cancelAdd").addEventListener("click", () => { resetForm(); closeSheet(); });
  $("scrim").addEventListener("click", () => { resetForm(); closeSheet(); });
  $("savePlace").addEventListener("click", savePlace);

  /* ---------- Roulette ---------- */
  const filterLunch = $("filterLunch");
  const result = $("result"), reel = $("reel"), halo = $("halo");
  const resultMenu = $("resultMenu"), resultHint = $("resultHint"),
        resultActions = $("resultActions"), resultEyebrow = $("resultEyebrow");
  let spinTimer = null;

  function candidates() {
    return filterLunch.checked ? places.filter((p) => p.hasLunch) : places.slice();
  }

  function openResult() {
    resultMenu.hidden = true; resultHint.hidden = true; resultActions.hidden = true;
    resultActions.textContent = "";
    reel.className = "reel"; halo.className = "halo";
    result.hidden = false;
  }
  function closeResult() {
    if (spinTimer) { clearTimeout(spinTimer); spinTimer = null; }
    result.hidden = true;
  }

  function spin() {
    const list = candidates();
    openResult();

    if (list.length === 0) {
      resultEyebrow.textContent = "Kein Treffer";
      reel.classList.add("landed");
      reel.textContent = "🤷";
      resultHint.hidden = false;
      resultHint.textContent = filterLunch.checked
        ? "Kein gespeicherter Ort hat ein Mittagsmenü hinterlegt."
        : "Füge erst einen Ort hinzu, dann dreht das Rad.";
      return;
    }

    resultEyebrow.textContent = "Heute geht's zu …";
    const winner = list[Math.floor(Math.random() * list.length)];

    const reveal = () => {
      spinTimer = null;
      reel.className = "reel landed";
      reel.textContent = winner.name;
      halo.className = "halo on";
      if (navigator.vibrate) try { navigator.vibrate(18); } catch (e) {}
      showWinnerMeta(winner);
    };

    if (prefersReduced || list.length === 1) { reveal(); return; }

    // Slot-Machine: schnell starten, sanft auslaufen
    reel.className = "reel spinning";
    const total = 1600;
    let elapsed = 0;
    const tick = () => {
      reel.textContent = list[Math.floor(Math.random() * list.length)].name;
      elapsed += 60;
      const delay = 55 + Math.pow(elapsed / total, 2.2) * 320; // wird langsamer
      spinTimer = setTimeout(elapsed < total ? tick : reveal, delay);
    };
    tick();
  }

  function showWinnerMeta(p) {
    if (p.hasLunch && p.lunchInfo) {
      resultMenu.hidden = false;
      resultMenu.textContent = "🍽️ " + p.lunchInfo;
    } else if (p.hasLunch) {
      resultMenu.hidden = false;
      resultMenu.textContent = "🍽️ Hat ein Mittagsmenü";
    }

    resultActions.textContent = "";
    const safe = safeUrl(p.url);
    if (safe) {
      const go = document.createElement("a");
      go.className = "rbtn rbtn--go";
      go.href = safe; go.target = "_blank"; go.rel = "noopener noreferrer";
      go.textContent = "↗ Link öffnen";
      resultActions.appendChild(go);
    }
    const live = document.createElement("button");
    live.className = "rbtn"; live.type = "button";
    live.textContent = "📍 Live-Status";
    live.addEventListener("click", () => openExternal(liveStatusUrl(p.name)));
    resultActions.appendChild(live);

    const again = document.createElement("button");
    again.className = "rbtn rbtn--again"; again.type = "button";
    again.textContent = "🎲 Nochmal drehen";
    again.addEventListener("click", spin);
    resultActions.appendChild(again);

    resultActions.hidden = false;
  }

  $("spin").addEventListener("click", spin);
  $("closeResult").addEventListener("click", closeResult);
  result.addEventListener("click", (e) => { if (e.target === result) closeResult(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closeResult(); if (!sheet.hidden) { resetForm(); closeSheet(); } }
  });

  /* ---------- Share Target / iOS-Shortcuts: ?url=&title=&text= einlesen ----------
     Android nutzt das echte Web-Share-Target (siehe Manifest unten).
     Auf dem iPhone kannst du per Kurzbefehl die App mit ?url=… öffnen –
     das Formular wird dann automatisch vorausgefüllt. */
  function handleShared() {
    const q = new URLSearchParams(location.search);
    const sharedUrl = q.get("url") || q.get("text") || "";
    const sharedTitle = q.get("title") || q.get("name") || "";
    if (!sharedUrl && !sharedTitle) return;

    openSheet();
    if (sharedTitle) fName.value = sharedTitle.trim();
    const maybe = safeUrl(sharedUrl);
    if (maybe) fUrl.value = maybe;
    else if (sharedUrl) {
      // Falls im "text" eine URL steckt, herausziehen
      const m = sharedUrl.match(/https?:\/\/\S+/);
      if (m) fUrl.value = m[0];
    }
    // Adressleiste aufräumen, damit ein Reload nicht erneut auslöst
    if (history.replaceState) history.replaceState(null, "", location.pathname);
  }

  /* ---------- PWA-Manifest + App-Icon zur Laufzeit (damit alles 1 Datei bleibt) ---------- */
  function makeIcon(size) {
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const x = c.getContext("2d");
    const r = size * 0.22;
    // warmer Hintergrund
    x.fillStyle = "#15120D";
    x.fillRect(0, 0, size, size);
    // gerundetes Akzent-Feld
    x.fillStyle = "#F3A227";
    x.beginPath();
    const m = size * 0.1, w = size - m * 2;
    x.moveTo(m + r, m);
    x.arcTo(m + w, m, m + w, m + w, r);
    x.arcTo(m + w, m + w, m, m + w, r);
    x.arcTo(m, m + w, m, m, r);
    x.arcTo(m, m, m + w, m, r);
    x.closePath(); x.fill();
    // Würfel-Emoji
    x.font = (size * 0.5) + "px serif";
    x.textAlign = "center"; x.textBaseline = "middle";
    x.fillText("🎲", size / 2, size / 2 + size * 0.03);
    return c.toDataURL("image/png");
  }

  function installPWA() {
    const icon180 = makeIcon(180), icon192 = makeIcon(192), icon512 = makeIcon(512);

    // iOS Homescreen-Icon
    const touch = document.createElement("link");
    touch.rel = "apple-touch-icon"; touch.href = icon180;
    document.head.appendChild(touch);

    const manifest = {
      name: "Location Roulette",
      short_name: "Roulette",
      description: "Deine Orte – lokal gespeichert. Lass den Zufall entscheiden.",
      start_url: "./index.html",
      scope: "./",
      display: "standalone",
      orientation: "portrait",
      background_color: "#15120D",
      theme_color: "#15120D",
      icons: [
        { src: icon192, sizes: "192x192", type: "image/png", purpose: "any" },
        { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
      ]
      // Hinweis: Kein "share_target" hier. Web Share Target bräuchte eine echte,
      // gehostete manifest.json (kein Blob) + Service Worker und wird auf iOS-Safari
      // ohnehin nicht unterstützt. Das Teilen läuft stattdessen über ?url=/?title=
      // (siehe handleShared) – z. B. via iOS-Kurzbefehl, host-unabhängig.
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  }

  /* ---------- Start ---------- */
  try { installPWA(); } catch (e) { /* Icon/Manifest optional – App läuft trotzdem */ }
  render();
  handleShared();
})();
</script>
</body>
</html>
